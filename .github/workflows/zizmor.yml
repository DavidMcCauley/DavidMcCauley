name: Zizmor (Actions security audit)

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Static analysis
    runs-on: ubuntu-24.04
    permissions:
      # required for actions/checkout to read the repository contents
      contents: read
      # required so zizmor can list workflow files via the Actions API
      actions: read
      # required to upload the SARIF result to GitHub code scanning
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
