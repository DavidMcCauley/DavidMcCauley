name: Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - "main"

# Default to read-only; the job that pushes the regenerated SVGs opts in below.
permissions:
  contents: read

# Avoid overlapping runs that would race on the same commit.
concurrency:
  group: summary-cards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate profile summary cards
    runs-on: ubuntu-24.04
    permissions:
      # required so the action can commit the regenerated SVGs to main
      contents: write
    steps:
      - name: Checkout Repository
        # zizmor: ignore[artipacked]
        # persist-credentials must stay true: the action below runs a bare
        # `git push` and relies on the auth header stamped by checkout.
        # This workflow uploads no artifacts, so the credentials cannot leak
        # via the artifact-exfiltration path artipacked warns about.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@5055b27ac896c627043ead432f9b2fa973aa2c80 # v0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -5
