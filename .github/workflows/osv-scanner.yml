name: OSV-Scanner (dependency vulnerability scan)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Default to no permissions; the reusable workflows below inherit only what is granted here.
permissions: {}

concurrency:
  group: osv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-scheduled:
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      # required to read repository contents during the scan
      contents: read
      # required for OSV-Scanner to list workflow files via the Actions API
      actions: read
      # required to upload the SARIF result to GitHub code scanning
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      # required to read repository contents during the scan
      contents: read
      # required for OSV-Scanner to list workflow files via the Actions API
      actions: read
      # required to upload the SARIF result to GitHub code scanning
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
