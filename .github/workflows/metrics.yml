name: Metrics

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
  push:
    branches:
      - "main"

# Default to read-only; the job that pushes the regenerated SVG opts in below.
permissions:
  contents: read

# Avoid overlapping runs that would race on the same commit.
concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-metrics:
    name: Generate GitHub metrics SVG
    runs-on: ubuntu-24.04
    # Scoped to the metrics environment so METRICS_TOKEN can be migrated to
    # an environment-scoped secret with deploy protection rules later.
    environment: metrics
    permissions:
      # required so lowlighter/metrics can commit the regenerated SVG to main
      contents: write
    steps:
      # gh-metrics/metrics is a "maintenance mode" community fork of
      # lowlighter/metrics that has fixed the achievements (Projects-classic
      # deprecation) and habits (undefined commit.author) bugs, plus surfaces
      # previously-silent plugin errors via plugins_errors_fatal.
      # SHA-pinned for supply-chain safety; same Docker container architecture
      # as upstream so the GitHub Actions node-runtime deprecation does not apply.
      # Bump deliberately after reviewing diffs at https://github.com/gh-metrics/metrics/commits/master
      - uses: gh-metrics/metrics@c726f0f9edfffb245f69a17e3e0acf3fd43e2a06
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: DavidMcCauley
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago
          # Explicit affiliations: without this, the paginated repositories
          # query that feeds computed.repositories.stargazers/forks/watchers/
          # releases can silently return empty nodes, which is why those four
          # rendered as 0 even though the public API shows non-zero totals.
          repositories_affiliations: owner
          # Reduce the batch size: the default of 100 timed out on this account
          # because the per-repo query fetches ~15 fields (releases, deployments,
          # environments, 8 languages, multiple issue/PR counts, license, ...).
          # When the first batch fails, the action's loop bails with 0 repos
          # loaded, which is why every per-repo stat aggregated to 0.
          repositories_batch: 25
          # Identities used when matching commit authors during indepth language
          # analysis. The default is the GitHub login ("DavidMcCauley") which
          # does not substring-match commits authored as "David McCauley"
          # (space) or with the work/personal emails. Without this, the indepth
          # analyzer filters out ~99% of the user's commits.
          commits_authoring: DavidMcCauley, David McCauley, davidm6136, david.mccauley
          # Surface plugin errors instead of silently rendering zeros.
          plugins_errors_fatal: no
          # plugin_achievements re-disabled: gh-metrics replaced the old
          # Projects-classic query with one that hits user.projectsV2, which
          # requires `read:project` scope on the PAT. METRICS_TOKEN does not
          # have that scope, so the field returns undefined and the plugin
          # crashes. To re-enable, add read:project to the PAT and uncomment.
          plugin_achievements: no
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          # Timeouts in MINUTES. Budget ~8 min for languages (rest of the run
          # is ~2 min Docker build + plugin work, staying inside the user's
          # 10-min total tolerance). Per-repo cap kept tight so a single
          # massive repo cannot monopolize the budget.
          plugin_languages_analysis_timeout: 8
          plugin_languages_analysis_timeout_repositories: 1.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          # Show percentages next to each language (default is no labels at all,
          # which is what made the chart look like an unlabeled monochrome bar).
          plugin_languages_details: percentage, lines, bytes-size
          # Use git-blame line-attribution instead of GraphQL byte counts.
          # GraphQL bytes can be wildly skewed by a single large .d.ts or
          # generated file; indepth clones the repos and tallies actual
          # authored lines, which better represents your real language mix.
          plugin_languages_indepth: yes
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14
          plugin_starlists: yes
          plugin_starlists_limit: 2
          plugin_starlists_limit_languages: 8
          plugin_starlists_limit_repositories: 2
          plugin_starlists_shuffle_repositories: yes
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: starred
          plugin_topics_sort: stars
