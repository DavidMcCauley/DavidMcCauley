name: Profile Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - "main"

# Default to read-only; the job that pushes the regenerated SVGs opts in below.
permissions:
  contents: read

# Avoid overlapping runs that would race on the same commit.
concurrency:
  group: stats-cards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate stats cards
    runs-on: ubuntu-24.04
    permissions:
      # required so we can commit the regenerated SVGs to main
      contents: write
    steps:
      - name: Checkout Repository
        # zizmor: ignore[artipacked]
        # persist-credentials must stay true: the final `git push` step relies
        # on the auth header stamped by checkout. This workflow uploads no
        # artifacts, so credentials cannot leak via the path artipacked warns about.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca # v2.0.0
        with:
          card: stats
          # include_all_commits removes the last-year cap.
          # count_private adds the publicly-exposed restrictedContributionsCount,
          # which is what private commits surface as without requiring a PAT.
          options: username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&hide_border=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca # v2.0.0
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=github_dark&hide_border=true&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards if changed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain profile/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/
            git commit -m "Update profile stats cards"
            git push
          else
            echo "No changes to commit."
          fi
