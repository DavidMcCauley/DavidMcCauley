name: Metrics

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
  push:
    branches:
      - "main"

# Default to read-only; the job that pushes the regenerated SVG opts in below.
permissions:
  contents: read

# Avoid overlapping runs that would race on the same commit.
concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-metrics:
    name: Generate GitHub metrics SVG
    runs-on: ubuntu-24.04
    # Scoped to the metrics environment so METRICS_TOKEN can be migrated to
    # an environment-scoped secret with deploy protection rules later.
    environment: metrics
    permissions:
      # required so lowlighter/metrics can commit the regenerated SVG to main
      contents: write
    steps:
      # lowlighter/metrics v3.34 pinned to commit SHA for supply-chain safety.
      # Bump deliberately after reviewing diffs at https://github.com/lowlighter/metrics/releases
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: DavidMcCauley
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14
          plugin_starlists: yes
          plugin_starlists_limit: 2
          plugin_starlists_limit_languages: 8
          plugin_starlists_limit_repositories: 2
          plugin_starlists_shuffle_repositories: yes
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: starred
          plugin_topics_sort: stars
